<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-APOCALYPSE</title>
    <!-- Fonts matching the original style -->
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { height: 100%; width: 100%; background-color: #000; background-image: url('zombie_bg.png'); background-size: cover; background-position: center; font-family: 'Roboto', sans-serif; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1; pointer-events: none; }
        .menu-container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .game-title { font-family: 'Creepster', cursive; font-size: 8rem; background: linear-gradient(to bottom, #ff0000 0%, #00ff00 50%, #111 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 8px; margin-bottom: 40px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5), 0 0 10px rgba(139, 0, 0, 0.8); animation: titlePulse 3s infinite ease-in-out; transition: all 0.3s ease; }
        @keyframes titlePulse { 0%, 100% { transform: scale(1); filter: brightness(1); text-shadow: 2px 2px 4px rgba(0,0,0,0.5), 0 0 10px rgba(139, 0, 0, 0.8); } 50% { transform: scale(1.03); filter: brightness(1.2); text-shadow: 4px 4px 8px rgba(0,0,0,0.7), 0 0 20px rgba(255, 0, 0, 0.6); } }
        .button-group { display: flex; flex-direction: column; gap: 15px; width: 320px; }
        .menu-btn { width: 100%; height: 60px; background: rgba(10, 0, 0, 0.7); border: 1px solid #333; color: #888; font-family: 'Creepster', cursive; font-size: 1.8rem; letter-spacing: 4px; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; display: flex; align-items: center; justify-content: center; text-transform: uppercase; overflow: visible; margin-bottom: 5px; }
        .menu-btn::before, .menu-btn::after { content: ''; position: absolute; width: 15px; height: 15px; border: 2px solid #8b0000; transition: all 0.4s ease; pointer-events: none; }
        .menu-btn::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .menu-btn::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }
        .menu-btn:not(.disabled):hover { color: #ff0000; background: rgba(20, 0, 0, 0.9); border-color: #500; letter-spacing: 8px; text-shadow: 0 0 15px rgba(255, 0, 0, 0.7); }
        .menu-btn:not(.disabled):hover::before, .menu-btn:not(.disabled):hover::after { width: calc(100% + 4px); height: calc(100% + 4px); border-image: linear-gradient(45deg, #ff0000, #00ff00) 1; filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.8)) drop-shadow(0 0 8px rgba(0, 255, 0, 0.5)); }
        .menu-btn span:not(.lock-icon) { position: relative; z-index: 5; background: linear-gradient(to bottom, #ff0000 0%, #00ff00 50%, #111 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: block; }
        .menu-btn.disabled { background: rgba(0, 0, 0, 0.9); border-color: #222; cursor: not-allowed; letter-spacing: 4px; opacity: 0.45; }
        .lock-icon { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); font-size: 1.4rem; color: #ccff00; filter: drop-shadow(0 0 5px #ccff00); pointer-events: none; transition: all 0.3s ease; font-family: sans-serif; line-height: 1; }
        .menu-btn:not(.disabled) .lock-icon { display: none; }
        .status-message { margin-top: 25px; font-size: 0.85rem; color: #ffffff; font-weight: 700; text-shadow: 1px 1px 2px #000; min-height: 20px; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; overflow: hidden; }
        .modal::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000 url('signup_bg.png') no-repeat center center / cover; filter: blur(5px) brightness(0.6); z-index: -1; transform: scale(1.1); }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 10, 10, 0.98); padding: 20px 25px; border: 1px solid #333; box-shadow: 0 0 40px rgba(0, 0, 0, 1); width: 400px; text-align: center; border-radius: 2px; position: relative; }
        .modal-content::before, .modal-content::after { content: ''; position: absolute; width: 40px; height: 40px; border: 3px solid; border-image: linear-gradient(45deg, #ff0000, #00ff00) 1; pointer-events: none; z-index: 10; }
        .modal-content::before { top: -3px; left: -3px; border-right: none; border-bottom: none; }
        .modal-content::after { bottom: -3px; right: -3px; border-left: none; border-top: none; }
        .close-btn { position: absolute; right: 12px; top: 5px; color: #8b0000; font-size: 1.8rem; cursor: pointer; z-index: 101; }
        .modal-content h2 { font-family: 'Creepster', cursive; font-size: 2.2rem; background: linear-gradient(to bottom, #ff0000 0%, #00ff00 50%, #111 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .modal-subtitle { color: #888; font-family: 'Creepster', cursive; font-size: 0.8rem; margin-bottom: 15px; text-transform: uppercase; }
        .input-group { margin: 10px 0; text-align: left; }
        .input-group label { display: block; color: #b8860b; font-family: 'Creepster', cursive; font-size: 1rem; letter-spacing: 1.5px; margin-bottom: 3px; text-transform: uppercase; }
        .input-group input { width: 100%; background: rgba(0,0,0,0.8); border: 1px solid #444; padding: 10px; color: #ffffff; font-family: 'Creepster', cursive; outline: none; font-size: 1.2rem; letter-spacing: 1.5px; }
        .input-group input:focus { border-color: #00ff00; background: rgba(0, 20, 0, 0.9); box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
        .password-wrapper { position: relative; width: 100%; display: flex; align-items: center; }
        .toggle-password { position: absolute; right: 10px; cursor: pointer; color: #b8860b; width: 20px; height: 20px; z-index: 5; opacity: 0.7; }
        .submit-btn { width: 100% !important; margin-top: 15px; background: linear-gradient(to bottom, #8b0000 0%, #440000 100%) !important; border: 1px solid #330000 !important; font-size: 1.5rem !important; padding: 8px 0 !important; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="menu-container">
        <h1 class="game-title">Z-APOCALYPSE</h1>
        <div class="button-group">
            <button id="btn-play" class="menu-btn disabled" disabled>
                <span>PLAY</span>
                <span class="lock-icon">🔒</span>
            </button>
            <button id="btn-signup" class="menu-btn"><span>SIGNUP</span></button>
            <button id="btn-login" class="menu-btn"><span>LOGIN</span></button>
        </div>
        <div class="status-message" id="status-message">Ready to survive?</div>
    </div>

    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2 id="modal-title"><span>LOGIN</span></h2>
            <div class="modal-subtitle">Join the resistance. Register now.</div>
            
            <form id="auth-form" onsubmit="return false;">
                <div class="input-group">
                    <label for="username">CODENAME / USERNAME</label>
                    <input type="text" id="username" required placeholder="e.g. Survivor_X">
                </div>
                
                <div id="signup-fields" style="display: none;">
                    <div class="input-group">
                        <label for="email">SURVIVOR EMAIL</label>
                        <input type="email" id="email" placeholder="e.g. name@email.com">
                    </div>
                    <div class="input-group">
                        <label for="password">CREATE PASSWORD</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="8+ chars">
                            <span class="toggle-password" onclick="toggleVisibility('password')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                            </span>
                        </div>
                    </div>
                </div>

                <div id="login-fields">
                    <div class="input-group">
                        <label for="login-password">PASSWORD</label>
                        <div class="password-wrapper">
                            <input type="password" id="login-password" placeholder="Enter password">
                            <span class="toggle-password" onclick="toggleVisibility('login-password')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                            </span>
                        </div>
                    </div>
                </div>

                <button type="button" id="loginBtn" onclick="executeDirectLogin()" class="menu-btn submit-btn"><span>SURVIVE NOW</span></button>
            </form>
        </div>
    </div>

    <script>
        let currentMode = 'login';
        let isUserLoggedIn = false;

        function toggleVisibility(id) {
            const input = document.getElementById(id);
            if (input.type === "password") input.type = "text";
            else input.type = "password";
        }

        function openModal(mode) {
            currentMode = mode;
            const modal = document.getElementById('auth-modal');
            const title = document.getElementById('modal-title');
            const signupFields = document.getElementById('signup-fields');
            const loginFields = document.getElementById('login-fields');
            const submitBtn = document.getElementById('loginBtn');
            const statusMsg = document.getElementById('status-message');

            statusMsg.textContent = '';
            title.innerHTML = `<span>${mode === 'login' ? 'LOGIN' : 'PLAYER REGISTRATION'}</span>`;
            
            if (mode === 'signup') {
                signupFields.style.display = 'block';
                loginFields.style.display = 'none';
                submitBtn.innerHTML = '<span>JOIN THE Z-APOCALYPSE</span>';
            } else {
                signupFields.style.display = 'none';
                loginFields.style.display = 'block';
                submitBtn.innerHTML = '<span>SURVIVE NOW</span>';
            }
            modal.style.display = 'block';
        }

        async function executeDirectLogin() {
            alert("CLICK WORKING! Attempting survivor authentication...");
            const username = document.getElementById('username').value.trim();
            const password = (currentMode === 'login') ? document.getElementById('login-password').value : document.getElementById('password').value;
            const email = document.getElementById('email').value.trim();

            if (!username || !password) { alert("CODENAME AND PASSWORD ARE REQUIRED!"); return; }

            const payload = { username, password };
            if (currentMode === 'signup') payload.email = email;

            try {
                const response = await fetch(`http://localhost:5100/api/auth/${currentMode}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json().catch(() => ({}));

                if (response.ok) {
                    if (currentMode === 'signup') {
                        alert('REGISTRATION SUCCESSFUL! PLEASE LOGIN NOW.');
                        openModal('login');
                    } else {
                        alert("AUTHENTICATED! PLAY BUTTON UNLOCKED.");
                        localStorage.setItem('loggedInUser', username);
                        localStorage.setItem('lastSurvivor', username);
                        isUserLoggedIn = true;
                        
                        // Close modal
                        document.getElementById('auth-modal').style.display = 'none';
                        
                        // Unlock Play Button
                        const playBtn = document.getElementById('btn-play');
                        playBtn.classList.remove('disabled');
                        playBtn.removeAttribute('disabled');
                        
                        // Update status message
                        document.getElementById('status-message').textContent = `Survivor ${username} ready! Press PLAY.`;
                    }
                } else {
                    alert("ACCESS DENIED: " + (data.message || "Invalid Credentials"));
                }
            } catch (err) { alert("SERVER CONNECTION ERROR: " + err.message); }
        }

        document.getElementById('btn-login').onclick = () => openModal('login');
        document.getElementById('btn-signup').onclick = () => openModal('signup');
        document.getElementById('close-modal').onclick = () => document.getElementById('auth-modal').style.display = 'none';
        document.getElementById('btn-play').onclick = () => {
            if (!isUserLoggedIn) openModal('login');
            else window.location.href = 'lobby.html';
        };
        window.onclick = (e) => { if (e.target == document.getElementById('auth-modal')) document.getElementById('auth-modal').style.display = 'none'; };
        
        window.onload = () => {
            localStorage.removeItem('loggedInUser');
            isUserLoggedIn = false;
            const playBtn = document.getElementById('btn-play');
            playBtn.classList.add('disabled');
            playBtn.setAttribute('disabled', 'true');
            document.getElementById('status-message').textContent = `Ready to survive? Login or Signup to start.`;
        };

        class ProceduralAudio {
            constructor() {
                this.ctx = null;
                this.masterVolumeNode = null;
                this.musicVolumeNode = null;
                this.sfxVolumeNode = null;
                this.droneOscs = [];
                this.droneGains = [];
                this.isMusicPlaying = false;
                this.masterVolume = 0.8;
                this.musicVolume = 0.6;
                this.sfxVolume = 0.9;
            }
            init() {
                if (this.ctx) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                this.masterVolumeNode = this.ctx.createGain();
                this.masterVolumeNode.gain.setValueAtTime(this.masterVolume, this.ctx.currentTime);
                this.masterVolumeNode.connect(this.ctx.destination);
                this.musicVolumeNode = this.ctx.createGain();
                this.musicVolumeNode.gain.setValueAtTime(this.musicVolume, this.ctx.currentTime);
                this.musicVolumeNode.connect(this.masterVolumeNode);
                this.sfxVolumeNode = this.ctx.createGain();
                this.sfxVolumeNode.gain.setValueAtTime(this.sfxVolume, this.ctx.currentTime);
                this.sfxVolumeNode.connect(this.masterVolumeNode);
            }
            setMasterVolume(vol) {
                this.masterVolume = Math.max(0, Math.min(1, vol));
                if (this.masterVolumeNode && this.ctx) {
                    this.masterVolumeNode.gain.setTargetAtTime(this.masterVolume, this.ctx.currentTime, 0.1);
                }
            }
            setMusicVolume(vol) {
                this.musicVolume = Math.max(0, Math.min(1, vol));
                if (this.musicVolumeNode && this.ctx) {
                    this.musicVolumeNode.gain.setTargetAtTime(this.musicVolume, this.ctx.currentTime, 0.1);
                }
            }
            setSfxVolume(vol) {
                this.sfxVolume = Math.max(0, Math.min(1, vol));
                if (this.sfxVolumeNode && this.ctx) {
                    this.sfxVolumeNode.gain.setTargetAtTime(this.sfxVolume, this.ctx.currentTime, 0.1);
                }
            }
            playClick() {
                this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const now = this.ctx.currentTime;

                // High-pass noise burst for a crisp mechanical click
                const bufferSize = this.ctx.sampleRate * 0.012;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
                }
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;

                const filter = this.ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.setValueAtTime(2200, now);

                const gainNode = this.ctx.createGain();
                gainNode.gain.setValueAtTime(this.masterVolume * this.sfxVolume * 0.25, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.012);

                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(this.ctx.destination);
                noise.start(now);

                // Quick sine drop for click body click
                const osc = this.ctx.createOscillator();
                const oscGain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(120, now + 0.008);
                oscGain.gain.setValueAtTime(this.masterVolume * this.sfxVolume * 0.2, now);
                oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.008);

                osc.connect(oscGain);
                oscGain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 0.01);
            }
            playZombieGroan() {
                try {
                    const audio = new Audio('https://upload.wikimedia.org/wikipedia/commons/f/f3/Zombie_moan.ogg');
                    audio.volume = this.masterVolume * this.sfxVolume * 0.6;
                    audio.play().catch(e => console.log("Zombie groan autoplay blocked or failed:", e));
                } catch (e) {
                    console.error("Zombie sound play error:", e);
                }
            }
            startZombieAmbient() {
                if (this.isMusicPlaying) return;
                this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                this.isMusicPlaying = true;
                const now = this.ctx.currentTime;
                const frequencies = [32.7, 49.0, 65.4, 77.8];
                frequencies.forEach((freq, idx) => {
                    const osc = this.ctx.createOscillator();
                    const gainNode = this.ctx.createGain();
                    const lfo = this.ctx.createOscillator();
                    const lfoGain = this.ctx.createGain();
                    osc.type = idx % 2 === 0 ? 'sine' : 'triangle';
                    osc.frequency.setValueAtTime(freq, now);
                    osc.detune.setValueAtTime((Math.random() - 0.5) * 15, now);
                    lfo.frequency.setValueAtTime(0.05 + Math.random() * 0.08, now);
                    lfoGain.gain.setValueAtTime(0.05, now);
                    lfo.connect(lfoGain);
                    lfoGain.connect(gainNode.gain);
                    gainNode.gain.setValueAtTime(0.08, now);
                    osc.connect(gainNode);
                    gainNode.connect(this.musicVolumeNode);
                    lfo.start(now);
                    osc.start(now);
                    this.droneOscs.push(osc, lfo);
                    this.droneGains.push(gainNode);
                });
                const noiseBufferSize = this.ctx.sampleRate * 2;
                const noiseBuffer = this.ctx.createBuffer(1, noiseBufferSize, this.ctx.sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseBufferSize; i++) {
                    noiseData[i] = Math.random() * 2 - 1;
                }
                const windSource = this.ctx.createBufferSource();
                windSource.buffer = noiseBuffer;
                windSource.loop = true;
                const windFilter = this.ctx.createBiquadFilter();
                windFilter.type = 'bandpass';
                windFilter.frequency.setValueAtTime(250, now);
                windFilter.Q.setValueAtTime(4, now);
                const windLfo = this.ctx.createOscillator();
                windLfo.frequency.setValueAtTime(0.08, now);
                const windLfoGain = this.ctx.createGain();
                windLfoGain.gain.setValueAtTime(150, now);
                windLfo.connect(windLfoGain);
                windLfoGain.connect(windFilter.frequency);
                const windGain = this.ctx.createGain();
                windGain.gain.setValueAtTime(0.03, now);
                windSource.connect(windFilter);
                windFilter.connect(windGain);
                windGain.connect(this.musicVolumeNode);
                windLfo.start(now);
                windSource.start(now);
                this.droneOscs.push(windSource, windLfo);

                const playCreepyChime = () => {
                    if (!this.isMusicPlaying) return;
                    const chimeNow = this.ctx.currentTime;
                    const chimeOsc = this.ctx.createOscillator();
                    const chimeGain = this.ctx.createGain();
                    const delay = this.ctx.createDelay();
                    const delayGain = this.ctx.createGain();
                    chimeOsc.type = 'sine';
                    const chimes = [261.6, 311.1, 370.0, 392.0, 523.3, 622.3, 740.0, 784.0];
                    const randomFreq = chimes[Math.floor(Math.random() * chimes.length)];
                    chimeOsc.frequency.setValueAtTime(randomFreq, chimeNow);
                    chimeGain.gain.setValueAtTime(0.05, chimeNow);
                    chimeGain.gain.exponentialRampToValueAtTime(0.001, chimeNow + 3.0);
                    delay.delayTime.setValueAtTime(0.4, chimeNow);
                    delayGain.gain.setValueAtTime(0.4, chimeNow);
                    chimeOsc.connect(chimeGain);
                    chimeGain.connect(this.musicVolumeNode);
                    chimeGain.connect(delay);
                    delay.connect(delayGain);
                    delayGain.connect(delay);
                    delayGain.connect(this.musicVolumeNode);
                    chimeOsc.start(chimeNow);
                    chimeOsc.stop(chimeNow + 3.2);
                    setTimeout(playCreepyChime, 6000 + Math.random() * 6000);
                };
                setTimeout(playCreepyChime, 4000);

                const playRandomZombieGroan = () => {
                    if (!this.isMusicPlaying) return;
                    this.playZombieGroan();
                    setTimeout(playRandomZombieGroan, 18000 + Math.random() * 18000);
                };
                setTimeout(playRandomZombieGroan, 15000);
            }
        }
        const gameAudio = new ProceduralAudio();
        document.addEventListener('click', (e) => {
            const isClickable = e.target.closest('button, .menu-btn, .close-btn, input[type="submit"], [onclick]');
            if (isClickable) {
                gameAudio.playClick();
            }
        });
        const startAudio = () => {
            gameAudio.init();
            gameAudio.startZombieAmbient();
            gameAudio.playZombieGroan();
            document.removeEventListener('click', startAudio);
            document.removeEventListener('keydown', startAudio);
        };
        document.addEventListener('click', startAudio);
        document.addEventListener('keydown', startAudio);
    </script>
</body>
</html>
